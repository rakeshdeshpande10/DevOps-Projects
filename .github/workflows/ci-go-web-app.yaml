name:CI

on:
  push:
    branches:
      - main
    paths:
      - 'go-web-app-devops-project/**' # Include all files in the folder
      - '!go-web-app-devops-project/README.md' # Exclude README.md files
      - '!go-web-app-devops-project/helm/**' # Exclude Helm files

jobs:
  
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v2
        with:
          go-version: 1.22

      - name: Build the application
        run: |
          cd go-web-app-devops-project
          go build -o go-web-app .

      - name: Run tests
        run: |
          cd go-web-app-devops-project
          go test ./...  
  
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2

  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./go-web-app-devops-project
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: 
          token: ${{ secrets.TOKEN }}

      - name: Update Helm chart with new image tag
        run: |
          cd go-web-app-devops-project
          sed -i 's/tag: .*/tag: "${{github.run_id}}"/' helm/go-web-app-chart/values.yaml
        
      - name: Commit and push changes
        run: |
          git config --global user.email "rakeshdeshpande10@gmail.com"
          git config --global user.name "Rakesh Deshpande"
          git add go-web-app-devops-project/helm/go-web-app-chart/values.yaml
          git commit -m "Update Helm chart with new image tag ${{github.run_id}}
          git push origin main
          
